    <script>
      (function() {
        const checkAndHide = () => {
          const elements = document.querySelectorAll('*');
          elements.forEach(el => {
            if (el.tagName === 'IFRAME' && el.src && el.src.includes('bolt.new')) {
              el.style.setProperty('display', 'none', 'important');
            }
            if (el.shadowRoot) {
              const html = el.shadowRoot.innerHTML;
              if (html.includes('bolt.new') || html.includes('Bolt') || html.includes('StackBlitz')) {
                el.style.setProperty('display', 'none', 'important');
              }
            }
            if (el.id && el.id.toLowerCase().includes('bolt')) {
              el.style.setProperty('display', 'none', 'important');
            }
            if (el.className && typeof el.className === 'string' && el.className.toLowerCase().includes('bolt')) {
              el.style.setProperty('display', 'none', 'important');
            }
          });
        };
        checkAndHide();
        const observer = new MutationObserver(checkAndHide);
        observer.observe(document.documentElement, { childList: true, subtree: true });
      })();
    </script>
